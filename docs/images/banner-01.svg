<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. GRADIENTE DE FUNDO -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <!-- <stop offset="0%" stop-color="#0E2A47"/>
    <stop offset="100%" stop-color="#4DA3FF"/> -->
    <stop offset="0%" stop-color="#4db2e1"/>
    <stop offset="100%" stop-color="#77d0ac"/>
    </linearGradient>

    <!-- 2. MÁSCARA DO GOL -->
    <clipPath id="netArea">
      <rect x="0" y="0" width="120" height="70" />
    </clipPath>

    <!-- 3. PADRÃO DA REDE -->
    <pattern id="innerNet" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <animate attributeName="x" values="0; 8; 0" dur="1.6s" keyTimes="0; 0.4; 1" repeatCount="indefinite" />
      <animate attributeName="y" values="0; 5; 0" dur="1.6s" keyTimes="0; 0.4; 1" repeatCount="indefinite" />
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="white" stroke-width="0.5" opacity="1"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="200" fill="url(#bg)" />

  <!-- CONJUNTO JOGADOR + GOL -->
  <g transform="translate(960, 138) scale(0.3)">
    
    <!-- GOL (Posicionado à direita) -->
    <g transform="translate(250, -190) scale(1.9)">
      <!-- Trave -->
      <path d="M0,70 L0,0 L120,0 L120,70" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
      
      <!-- Rede Animada -->
      <g clip-path="url(#netArea)">
        <path fill="url(#innerNet)" stroke="white" stroke-width="0.8" opacity="0.9">
          <animate attributeName="d" dur="1.6s" keyTimes="0; 0.4; 1" repeatCount="indefinite"
            values="M0,0 Q60,-10 120,0 L120,70 Q60,70 0,70 Z; 
                    M0,0 Q100,-30 120,0 L120,70 Q100,100 0,70 Z; 
                    M0,0 Q60,-10 120,0 L120,70 Q60,70 0,70 Z" />
        </path>
      </g>
    </g>

    <!-- JOGADOR -->
    <g transform="translate(0, -50)">
      <!-- Corpo -->
      <line x1="0" y1="-40" x2="0" y2="-85" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-95" r="8" stroke="white" stroke-width="2.5" fill="none"/>
      
      <!-- Braços Curvados -->
      <g stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round">
        <path d="M0,-75 Q-12,-72 -20,-60">
          <animateTransform attributeName="transform" type="rotate" values="0 0 -75; -20 0 -75; 0 0 -75" dur="1.6s" repeatCount="indefinite" />
        </path>
        <path d="M0,-75 Q12,-72 20,-60">
          <animateTransform attributeName="transform" type="rotate" values="0 0 -75; 25 0 -75; 0 0 -75" dur="1.6s" repeatCount="indefinite" />
        </path>
      </g>

      <!-- Perna de Apoio -->
      <path d="M0,-40 L-5,-20 L-13,0" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Perna de Chute -->
      <path d="M0,-40 L5,-20 L13,0" stroke="white" stroke-width="3" fill="none" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" 
          values="-40 0 -40; -80 0 -40; 80 0 -40" 
          keyTimes="0; 0.3; 1" dur="2.5s" repeatCount="indefinite" 
          calcMode="spline" keySplines="0.1 0.8 0.2 1; 0.4 0 0.2 1" />
      </path>

      <!-- Bola -->
      <circle r="7" fill="yellow">
         <animate attributeName="cx" values="5; 450; 5" keyTimes="0; 0.4; 1" dur="2.5s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.1 0.8 0.2 1; 0.4 0 0.2 1" />
         <animate attributeName="cy" values="-3; -110; -3" keyTimes="0; 0.4; 1" dur="2.5s" repeatCount="indefinite" />
      </circle>
    </g> <!-- Fim do Jogador -->
  </g> 
</svg>
